<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1, user-scalable=no" />
    <title>Local Public Eatery - Beerboard</title>
    <link href="css/flapper.css" type="text/css" rel="stylesheet" />
    <link href="css/beer-board.css" type="text/css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
    <script src="transform/jquery.transform-0.9.3.min.js"></script>
    <script src="src/jquery.flapper.js"></script>
    <script type="module" src="src/beer-board.js"></script>
    <link href="/img/fav.png" rel="shortcut icon" />
    <style type="text/css">
      html, body { margin: 0; padding: 0; background-color: #474747; }
      .flapper .digit,
      .flapper .digit .front.top,
      .flapper .digit .front.bottom,
      .flapper .digit .back.top,
      .flapper .digit .back.bottom {
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        will-change: transform;
      }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div class="page">
      <div class="headerContainer">
        <div id="menu-header">
          <div class="logo">
            <img src="img/Logos/Logo-White-Nov29.svg" style="width: 85%" />
          </div>
          <div class="display countDown">
            <input class="dark CU" id="header_display_m" />
            <input class="dark CU" id="header_display" />
          </div>
        </div>
      </div>

      <div class="on-tap" id="onTap">
        <input class="display CU header" id="row1" />
        <input class="display CU header" id="row2" />
        <input class="display CU" id="row3" />
        <input class="display CU" id="row4" />
        <input class="display CU" id="row5" />
        <input class="display CU" id="row6" />
        <input class="display CU" id="row7" />
        <input class="display CU" />
      </div>
      <div class="on-deck" id="onDeck">
        <input class="display CU" id="row8" />
        <input class="display CU header" id="row9" />
        <input class="display CU" id="row10" />
        <input class="display CU" id="row11" />
        <input class="display CU" id="row12" />
        <input class="display CU" id="row13" />
        <input class="display CU" />
        <input class="display CU" />
      </div>
    </div>
  </body>
</html>
