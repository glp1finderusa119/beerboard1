<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1, user-scalable=no" />
    <title>Local Public Eatery - Beerboard</title>
    <link href="/img/fav.png" rel="shortcut icon" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #474747;
      }
      iframe {
        border: 0;
        width: 1920px;
        height: 1080px;
        display: block;
      }
    </style>
  </head>
  <body>
    <iframe id="board" allowfullscreen></iframe>
    <script>
      var VALID = ["LWOO","LSWD","LLIB","LHEN","LADE","LRIV","LEAU","LPEN","TEST","TEST2"];
      var raw = new URLSearchParams(location.search).get("store") || "";
      var store = raw.toUpperCase().replace(/[^A-Z0-9]/g, "");
      if (VALID.indexOf(store) === -1) store = "LWOO";
      document.getElementById("board").src =
        "https://beerboard.localpubliceatery.com/?store=" + store;
    </script>
  </body>
</html>
